openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Mapa Espacial
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: items
    description: Map item operations
  - name: agora
    description: Agora voice channel tokens
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /items/nearby:
    get:
      operationId: getNearbyItems
      tags: [items]
      summary: Get items near a location
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
        - in: query
          name: lng
          required: true
          schema:
            type: number
        - in: query
          name: radius
          required: false
          schema:
            type: number
            default: 600
      responses:
        "200":
          description: Nearby items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/MapItem"
                required: [items]

  /items/{itemId}/collect:
    post:
      operationId: collectItem
      tags: [items]
      summary: Collect an item
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                lat:
                  type: number
                lng:
                  type: number
              required: [userId, lat, lng]
      responses:
        "200":
          description: Collected successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]
        "409":
          description: Collection failed

  /agora/token:
    post:
      operationId: createAgoraToken
      tags: [agora]
      summary: Generate an Agora RTC channel token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelName:
                  type: string
                uid:
                  type: number
              required: [channelName]
      responses:
        "200":
          description: Token generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgoraToken"
        "503":
          description: Agora not configured

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MapItem:
      type: object
      properties:
        id:
          type: string
        lat:
          type: number
        lng:
          type: number
        type:
          type: string
          enum: [coin, gem, star, chest, crystal]
        collected:
          type: boolean
      required: [id, lat, lng, type, collected]

    AgoraToken:
      type: object
      properties:
        token:
          type: string
        appId:
          type: string
        channelName:
          type: string
        uid:
          type: number
      required: [token, appId, channelName, uid]
